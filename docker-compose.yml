services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: Your_strong_password123
    ports: ["1433:1433"]
  api:
    build:
      context: ./backend
      dockerfile: ExpenseTracker.API/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports: ["8080:8080"]
    depends_on: [sqlserver]
  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [api]
